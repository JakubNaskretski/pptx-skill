# Asset / atom sidecar — one file per visual atom.
# Filename matches the binary: <sha1>.yaml ↔ <sha1>.<ext>.
#
# The consuming agent has NO vision capability — it picks atoms
# purely by reading these fields. Optimize for retrieval, not
# captioning. Use neutral, literal language.

# --- Identity (auto, do not hand-edit) --------------------------------------

# Filled on ingest, e.g. "asset_3e58c8f9".
id: ""

# Binary content hash; matches the sidecar filename stem.
sha1: ""

# Which deck/slide(s) this atom came from. Manual uploads carry an
# `external: manual-upload` entry instead of `deck`/`slide`.
sources:
  - deck: ""
    slide: 0

# --- Type (mechanical at ingest; validated against asset.kind enum) ---------

# Raster pictures:
#   photo | icon | logo | illustration | screenshot
# Vector picture:
#   vector      — SVG or EMF; DPI-independent, recolourable
# Structured atoms:
#   table       — has cell data + style fragment
#   chart       — has series data + chart XML fragment
#   callout     — has shape XML fragment + bounding geometry
#   freeform    — has custom path XML
#   smartart    — has layout + node text + fragment XML
kind: ""

# --- Mechanical visual (auto from binary) -----------------------------------

# Pixel dimensions of the binary. For SVG, derived from the viewBox
# when present, otherwise 0. Powers `check-asset-fit` math; never
# used as a categorical filter.
width: 0
height: 0
aspect: 0.0           # width / height as a float (16:9 → 1.778)

# Hex codes extracted from binary or XML at ingest. Used by the
# compose engine for recolouring (when the plan supplies a recolour
# map). For SVGs: every unique fill/stroke colour. For rasters: the
# top dominant colours by frequency.
colors_hex: []        # ["#0A2540", "#F26B38"]

# Subset of colors_hex that the compose engine knows how to find and
# rewrite inside SVG/EMF source. Only set for kind: vector.
recolor_targets: []   # ["#0A2540", "#F26B38"]

# --- Soft description (vision LLM or human) ---------------------------------

# 1-4 tags from the workspace tag vocabulary
# (authoring/workspace/tag_vocab.yaml). The vocab is editable via
# `cli.py tag-vocab` and the web UI.
tags: []              # [people, office, laptop]

# One short sentence describing what is literally visible. Under
# 25 words; neutral, factual. Used only for tiebreaks among the
# `find-asset` shortlist — never a filter input.
description: ""

# --- Kind-specific structural blocks (auto-populated by Phase B ingest) -----
#
# Only the block matching this atom's `kind` is relevant. Others
# stay empty / are omitted.

# For kind: table
table:
  rows: 0
  cols: 0
  headers: []         # column header strings (first row)
  sample_cells: []    # first few rows verbatim for retrieval context

# For kind: chart
chart:
  type: ""            # bar | line | pie | scatter | column | area | combo
  series_count: 0
  categories_count: 0

# For kind: callout | freeform
shape:
  geometry: ""        # rect | rounded-rect | ellipse | arrow | triangle |
                      # flowchart-step | banner | star | callout-cloud | ...
  is_recolorable: false   # true if the fill is a solid colour the
                          # engine can rewrite via the recolor map

# For kind: smartart
smartart:
  layout: ""          # which SmartArt layout (e.g. "process", "hierarchy")
  nodes: []           # text from each node, in reading order

# --- Workflow / optional ----------------------------------------------------

# pending  → not yet described (tags + description empty)
# done     → all required fields filled, auto-set by `validate`
# locked   → frozen against re-ingest changes
status: pending

# Free-form reviewer notes — anything that doesn't fit the structured
# fields. Ignored by the consumer agent's filter logic.
notes: ""
