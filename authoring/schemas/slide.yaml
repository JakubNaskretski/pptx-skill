# Slide template sidecar — one file per extractable slide.
# Filename: slide_NN.yaml ↔ slide_NN.pptx.
#
# Describe what the slide is FOR (its purpose / shape), not its
# specific text or images. The downstream agent picks templates by
# intent, then either replaces all slot content at compose time
# (template mode) or extracts individual atoms onto a custom canvas
# (compose mode — see PLAN.md → v4).

# --- Required descriptive fields ---

# One sentence describing what this slide is FOR.
# Under 20 words. Talk about purpose, not content.
# Bad:  "Slide showing the X-1000 product photo with marketing tagline."
# Good: "Hero product showcase with single bold claim."
intent: ""

# Tone of the slide as designed. Pick from the enum:
#   formal | punchy | data-dense | warm | clinical | celebratory
feel: ""

# Slide-role tags. 1-4 entries from:
#   opener | section_divider | content | data | quote | closing |
#   product | team
suitable_for: []

# --- Workflow / optional ---

status: pending     # pending | done | locked
notes: ""           # free-form reviewer notes

# Model's speculative observations about the slide — design rationale
# the model infers, audience guesses, things noticed beyond what
# `intent` / `feel` capture (e.g. "looks like a Q4 retrospective; the
# yellow callout reads as a celebratory accent rather than a warning").
# Visible to the consuming agent as INFORMATIONAL context — never a
# filter target. Distinct from `notes` (human reviewer free-form).
interpretation: ""

# --- Auto-populated structural fields (do not hand-edit) ---
#
# `layout` is best-effort inferred from placeholder geometry.
# If it is wrong, edit it — the consumer agent uses this as
# a hint when picking templates.

id: ""
layout: ""          # e.g. "title-left, image-right", "title-top, 4-quadrant"

# --- v4: auto-extracted style snapshot (do not hand-edit) ---
#
# These fields are filled by Phase B ingest. They are INFORMATIONAL
# for the consuming agent — they describe the template's actual
# styling so the agent can match it to deck policy. Existing
# templates (pre-v4) leave these empty and behave unchanged.

# Colours used on this template. Auto-extracted from master/theme
# and per-run inspection. Empty = "not yet extracted".
theme_colors: {}    # {primary: "#0A2540", accent: "#F26B38", text: "#222222"}

# Major/minor latin fonts from the theme font scheme.
fonts: {}           # {major: "Inter", minor: "Inter"}

# Slots the consumer agent can fill. Stable ids inferred from
# placeholder kind + position. `kind` is one of:
#   text | bullets | image | table | chart
# `style` captures the template's actual styling so the agent
# can decide whether to inherit (cheap) or override (creative).
# `style` is informational, auto-populated by Phase B ingest;
# pre-v4 templates leave it empty.
slots:
  - id: title
    kind: text
    max_chars: 60
    style: {}        # {font: "Inter", size_pt: 36, bold: true, color: "#0A2540", color_role: "primary"}
  # - id: hero
  #   kind: image
  #   aspect: "16:9"          # 16:9 | 4:3 | 1:1 | 3:4 | 9:16 | free
  # - id: bullets
  #   kind: bullets
  #   max_items: 4
  #   style: {}
  # - id: data
  #   kind: table              # NEW (v4) — structured slot for cell data
  #   rows: 4
  #   cols: 3

# Decorative atoms present on this template (informational; carried
# verbatim by template-mode compose, individually addressable by
# compose-mode if the agent wants to reuse them outside the template).
#
# v4.2: list of per-shape dicts with positional info. Each entry:
#   - atom:   asset id ("asset_<sha8>")
#   - kind:   image | vector | table | chart | callout | freeform | smartart
#   - x,y,w,h: slide-relative fractions (0.0-1.0)
#   - region: coarse position quadrant (e.g. "bottom-right")
#
# Together with `layout` and `slots`, this gives the compose-time
# agent the slide's anatomy beyond just its descriptive `intent`:
# which assets are on this slide and where.
# Auto-populated by Phase B ingest. Pre-v4.2 templates may show empty
# list or the older bare-id format; re-ingest to refresh.
inventory: []        # [{atom: asset_xxx, kind: image, region: bottom-right, x: 0.85, y: 0.86, w: 0.13, h: 0.13}]

sources:
  - deck: ""
    slide: 0
