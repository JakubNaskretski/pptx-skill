# Controlled vocabulary — single source of truth.
#
# Slide enums are unchanged. The asset side keeps only `kind` here:
# tag classification for assets is workspace-managed and lives in
# `authoring/workspace/tag_vocab.yaml` so the user can add or remove
# tags without editing source schemas. Everything else that used to
# describe an asset (feel / composition / suitable_for / scope /
# colors-as-words) has been dropped in favor of a single short
# `description` field plus mechanical dimension metadata.

slide:
  feel:
    - formal
    - punchy
    - data-dense
    - warm
    - clinical
    - celebratory
  suitable_for:
    - opener
    - section_divider
    - content
    - data
    - quote
    - closing
    - product
    - team

asset:
  kind:
    # Raster pictures
    - photo
    - icon
    - logo
    - illustration
    - screenshot
    # Vector picture — SVG/EMF, recolourable
    - vector
    # Structured atoms — addressable via compose-mode plans
    - table
    - chart
    - callout
    - freeform
    - smartart
