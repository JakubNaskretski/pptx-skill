# Controlled vocabulary — single source of truth.
#
# The asset side keeps only `kind` here. Tag classification for
# assets is workspace-managed and lives in
# `authoring/workspace/tag_vocab.yaml` so the user can add or remove
# tags without editing source schemas. v4 slide describer enums
# (feel / suitable_for) were removed when slides moved out of the
# review loop in favor of skeletons.

asset:
  kind:
    # Raster pictures
    - photo
    - icon
    - logo
    - illustration
    - screenshot
    # Vector picture — SVG/EMF, recolourable
    - vector
    # Structured atoms — addressable via compose-mode plans
    - table
    - chart
    - callout
    - freeform
    - smartart
